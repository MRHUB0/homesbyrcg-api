AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Enterprise serverless foundation for Homes by RCG API.

Parameters:
  AppEnvironment:
    Type: String
    Default: development
    AllowedValues:
      - local
      - development
      - staging
      - production
  ServiceName:
    Type: String
    Default: homesbyrcg-api
  LogLevel:
    Type: String
    Default: info
    AllowedValues:
      - debug
      - info
      - warn
      - error
  CorsAllowedOrigins:
    Type: String
    Default: '*'
  MaxRequestBytes:
    Type: Number
    Default: 1048576
  LeadProviderMode:
    Type: String
    Default: mock
    AllowedValues:
      - mock
      - ses
  SesSender:
    Type: String
    Default: ''
    NoEcho: true
  SesRecipient:
    Type: String
    Default: ''
    NoEcho: true
  SesIdentity:
    Type: String
    Default: ''

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    MemorySize: 256
    Timeout: 10
    Tracing: Active
    Environment:
      Variables:
        APP_ENV: !Ref AppEnvironment
        SERVICE_NAME: !Ref ServiceName
        LOG_LEVEL: !Ref LogLevel
        CORS_ALLOWED_ORIGINS: !Ref CorsAllowedOrigins
        MAX_REQUEST_BYTES: !Ref MaxRequestBytes
        LEAD_PROVIDER_MODE: !Ref LeadProviderMode
        LEAD_TABLE_NAME: !Ref LeadTable
        SES_SENDER: !Ref SesSender
        SES_RECIPIENT: !Ref SesRecipient
        SES_REGION: !Ref AWS::Region
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: WARN
  Api:
    OpenApiVersion: 3.0.1
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Correlation-Id,X-Request-Id,Idempotency-Key'"
      AllowOrigin: !Sub "'${CorsAllowedOrigins}'"

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref AppEnvironment
      CorsConfiguration:
        AllowOrigins: !Split [',', !Ref CorsAllowedOrigins]
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Correlation-Id
          - X-Request-Id
          - Idempotency-Key
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${ServiceName}-${AppEnvironment}
      RetentionInDays: 30

  LeadTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ServiceName}-${AppEnvironment}-leads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: leadId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: leadId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: LeadEmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ServiceName}-${AppEnvironment}-health
      Description: Health endpoint for the Homes by RCG API foundation.
      CodeUri: .
      Handler: src/handlers/health/index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET

  OpenApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ServiceName}-${AppEnvironment}-openapi
      Description: OpenAPI contract endpoint for browser clients.
      CodeUri: .
      Handler: src/handlers/openapi/index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        OpenApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /openapi.yaml
            Method: GET

  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ServiceName}-${AppEnvironment}-contact
      Description: Contact submission endpoint for Homes by RCG.
      CodeUri: .
      Handler: src/handlers/contact/index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt LeadTable.Arn
                - !Sub ${LeadTable.Arn}/index/LeadEmailIndex
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: !Sub arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesIdentity}
      Events:
        Contact:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /contact
            Method: POST
        ContactOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /contact
            Method: OPTIONS

  ConsultationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ServiceName}-${AppEnvironment}-consultation
      Description: Consultation lead intake endpoint for Homes by RCG.
      CodeUri: .
      Handler: src/handlers/consultation/index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt LeadTable.Arn
                - !Sub ${LeadTable.Arn}/index/LeadEmailIndex
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: !Sub arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesIdentity}
      Events:
        Consultation:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /consultation
            Method: POST
        ConsultationOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /consultation
            Method: OPTIONS

  HomeValueFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ServiceName}-${AppEnvironment}-home-value
      Description: Home value lead intake endpoint for Homes by RCG.
      CodeUri: .
      Handler: src/handlers/home-value/index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt LeadTable.Arn
                - !Sub ${LeadTable.Arn}/index/LeadEmailIndex
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: !Sub arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesIdentity}
      Events:
        HomeValue:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /home-value
            Method: POST
        HomeValueOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /home-value
            Method: OPTIONS

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${AppEnvironment}
  LeadTableName:
    Description: DynamoDB table used for durable lead persistence.
    Value: !Ref LeadTable
  HealthEndpoint:
    Description: Health endpoint URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${AppEnvironment}/health
  ContactEndpoint:
    Description: Contact endpoint URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${AppEnvironment}/contact
  ConsultationEndpoint:
    Description: Consultation endpoint URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${AppEnvironment}/consultation
  HomeValueEndpoint:
    Description: Home value endpoint URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${AppEnvironment}/home-value
  OpenApiEndpoint:
    Description: OpenAPI contract endpoint URL.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${AppEnvironment}/openapi.yaml
  HealthFunctionArn:
    Description: Health Lambda function ARN.
    Value: !GetAtt HealthFunction.Arn
  OpenApiFunctionArn:
    Description: OpenAPI Lambda function ARN.
    Value: !GetAtt OpenApiFunction.Arn
  ContactFunctionArn:
    Description: Contact Lambda function ARN.
    Value: !GetAtt ContactFunction.Arn
  ConsultationFunctionArn:
    Description: Consultation Lambda function ARN.
    Value: !GetAtt ConsultationFunction.Arn
  HomeValueFunctionArn:
    Description: Home value Lambda function ARN.
    Value: !GetAtt HomeValueFunction.Arn
